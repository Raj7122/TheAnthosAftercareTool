<!doctype html>
<!--
  Mock Salesforce Console parent page for the P1B-07 OAuth + iframe E2E.

  A deliberately minimal stand-in for the real embedding page: just enough of
  a Salesforce Lightning shell to embed the Anthos tool in an <iframe> exactly as the
  Console does. Served by the mock Salesforce server, so its origin
  (http://127.0.0.1:4500) is the cross-site parent the BFF's
  `frame-ancestors` allowlist must name (TR-AUTH-5, SEC-THREAT-1).

  The iframe `src` points straight at the BFF login endpoint — the SPA shell
  is F-02 (Sub-phase 1C) and not needed: the OAuth redirect chain
  (login → authorize → callback → /) runs entirely inside this frame.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Salesforce Console — Anthos Aftercare (E2E mock)</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Salesforce Sans", Arial, sans-serif;
        background: #b0c4df;
      }
      header {
        height: 48px;
        background: #1d2a4a;
        color: #fff;
        display: flex;
        align-items: center;
        padding: 0 16px;
        font-size: 14px;
      }
      .frame-wrap {
        position: absolute;
        top: 64px;
        left: 16px;
        right: 16px;
        bottom: 16px;
        border: 2px dashed #1b65d6;
        background: #fff;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <header>Salesforce Console &nbsp;›&nbsp; Anthos|Home Aftercare</header>
    <div class="frame-wrap">
      <iframe
        id="anthos-app"
        title="Anthos Aftercare"
        src="http://localhost:3000/api/v1/auth/login"
      ></iframe>
    </div>
  </body>
</html>
